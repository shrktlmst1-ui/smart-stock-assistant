# Render Blueprint — Smart Stock Assistant
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: smart-stock-assistant
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://smart-stock-assistant-web.onrender.com,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000

  - type: web
    name: smart-stock-assistant-web
    runtime: static
    rootDir: app
    buildCommand: >-
      curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz -o flutter.tar.xz
      && tar xf flutter.tar.xz
      && export PATH="$PWD/flutter/bin:$PATH"
      && flutter config --enable-web
      && flutter pub get
      && flutter build web --release
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
